version: '3.8'

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - streaming

x-ms-env: &ms-env
  KAFKA_BROKER: kafka:9092
  DATABASE_URL: postgresql://streaming:streaming@postgres:5432/streaming
  REDIS_URL: redis://redis:6379
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318

services:

  # ─────────────────────────────────────────
  # INFRA
  # ─────────────────────────────────────────
  zookeeper:
    <<: *service-defaults
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    <<: *service-defaults
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"
      KAFKA_LOG4J_LOGGERS: "kafka=WARN,org.apache.kafka=WARN"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 30s

  kafka-ui:
    <<: *service-defaults
    image: provectuslabs/kafka-ui:latest
    depends_on: [kafka]
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  kafka-exporter:
    <<: *service-defaults
    image: danielqsj/kafka-exporter:latest
    depends_on: [kafka]
    command: ["--kafka.server=kafka:9092"]
    ports:
      - "9308:9308"

  clickhouse:
    <<: *service-defaults
    image: clickhouse/clickhouse-server:23.8
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: logs
      CLICKHOUSE_USER: streaming
      CLICKHOUSE_PASSWORD: streaming
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infra/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    <<: *service-defaults
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    <<: *service-defaults
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: streaming
      POSTGRES_USER: streaming
      POSTGRES_PASSWORD: streaming
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streaming"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    <<: *service-defaults
    image: minio/minio:latest
    ports:
      - "9010:9000"
      - "9011:9001"
    environment:
      MINIO_ROOT_USER: streaming
      MINIO_ROOT_PASSWORD: streaming123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # ─────────────────────────────────────────
  # MICROSERVICES
  # ─────────────────────────────────────────
  user-service:
    <<: *service-defaults
    build: ./services/user-service
    ports:
      - "3001:3000"
    environment:
      <<: *ms-env
      SERVICE_NAME: user-service
      PORT: 3000
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    labels:
      logging: "promtail"
      logging_jobname: "user-service"

  watch-service:
    <<: *service-defaults
    build: ./services/watch-service
    ports:
      - "3002:3000"
    environment:
      <<: *ms-env
      SERVICE_NAME: watch-service
      PORT: 3000
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      logging: "promtail"
      logging_jobname: "watch-service"

  like-service:
    <<: *service-defaults
    build: ./services/like-service
    ports:
      - "3003:3000"
    environment:
      <<: *ms-env
      SERVICE_NAME: like-service
      PORT: 3000
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      logging: "promtail"
      logging_jobname: "like-service"

  payment-service:
    <<: *service-defaults
    build: ./services/payment-service
    ports:
      - "3004:3000"
    environment:
      <<: *ms-env
      SERVICE_NAME: payment-service
      PORT: 3000
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    labels:
      logging: "promtail"
      logging_jobname: "payment-service"

  recommendation-service:
    <<: *service-defaults
    build: ./services/recommendation-service
    ports:
      - "3005:3000"
    environment:
      <<: *ms-env
      SERVICE_NAME: recommendation-service
      PORT: 3000
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      logging: "promtail"
      logging_jobname: "recommendation-service"

  log-processor:
    <<: *service-defaults
    build: ./services/log-processor
    environment:
      SERVICE_NAME: log-processor
      KAFKA_BROKER: kafka:9092
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_DB: logs
      CLICKHOUSE_USER: streaming
      CLICKHOUSE_PASSWORD: streaming
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    labels:
      logging: "promtail"
      logging_jobname: "log-processor"

  # ─────────────────────────────────────────
  # OBSERVABILITY
  # ─────────────────────────────────────────
  otel-collector:
    <<: *service-defaults
    image: otel/opentelemetry-collector-contrib:0.88.0
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus scrape endpoint
    volumes:
      - ./observability/otel-collector/config.yaml:/etc/otel-collector-config.yaml
    command: ["--config=/etc/otel-collector-config.yaml"]

  prometheus:
    <<: *service-defaults
    image: prom/prometheus:v2.47.0
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'

  grafana:
    <<: *service-defaults
    image: grafana/grafana:10.2.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
      - loki
      - jaeger

  jaeger:
    <<: *service-defaults
    image: jaegertracing/all-in-one:1.50
    ports:
      - "16686:16686"   # Jaeger UI
      - "14268:14268"   # HTTP collector
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: memory

  loki:
    <<: *service-defaults
    image: grafana/loki:2.9.0
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki

  promtail:
    <<: *service-defaults
    image: grafana/promtail:2.9.0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./observability/promtail/config.yaml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on: [loki]

networks:
  streaming:
    driver: bridge

volumes:
  clickhouse_data:
  redis_data:
  postgres_data:
  minio_data:
  prometheus_data:
  grafana_data:
  loki_data:
